set_input_label:
  name: Set input label
  description: Set a Lumagen input label for memory A, B, C, or D.
  fields:
    entity_id:
      name: Entity
      description: Lumagen entity to control. Required when multiple Lumagen devices are configured.
      required: false
      selector:
        entity:
          integration: lumagen
    memory:
      name: Memory
      description: Input memory to update.
      required: true
      example: A
      selector:
        select:
          options:
            - A
            - B
            - C
            - D
    input_number:
      name: Input number
      description: Input number to label. Lumagen command supports inputs 1 through 8.
      required: true
      example: 2
      selector:
        number:
          min: 1
          max: 8
          mode: box
    label:
      name: Label
      description: New input label. Maximum 10 characters.
      required: true
      example: ATV 2A
      selector:
        text: {}

set_input_labels:
  name: Set input labels
  description: Set multiple Lumagen input labels for memory A, B, C, or D.
  fields:
    entity_id:
      name: Entity
      description: Lumagen entity to control. Required when multiple Lumagen devices are configured.
      required: false
      selector:
        entity:
          integration: lumagen
    memory:
      name: Memory
      description: Input memory to update.
      required: true
      example: A
      selector:
        select:
          options:
            - A
            - B
            - C
            - D
    labels:
      name: Labels
      description: List of input labels to set. Lumagen command supports inputs 1 through 8.
      required: true
      example:
        - input_number: 1
          label: ATV 1A
        - input_number: 2
          label: Roku 2A
        - input_number: 3
          label: Kscape 3A
      selector:
        object:

display_message:
  name: Display message
  description: Display a message on the Lumagen OSD.
  fields:
    entity_id:
      name: Entity
      description: Lumagen entity to control. Required when multiple Lumagen devices are configured.
      required: false
      selector:
        entity:
          integration: lumagen
    message:
      name: Message
      description: Message to display. Used when line1 and line2 are not supplied.
      required: false
      selector:
        text: {}

    message_placement:
      name: Message placement
      description: Where to place the Message field when not using Line 1 / Line 2.
      required: false
      default: auto
      selector:
        select:
          mode: dropdown
          options:
            - label: Auto wrap across both lines
              value: auto
            - label: Put message on line 1
              value: line1
            - label: Put message on line 2
              value: line2
  
    line1:
      name: Line 1
      description: Exact text for OSD line 1. Maximum 30 characters; longer text is truncated.
      required: false
      example: "Volume"
      selector:
        text: {}

    line2:
      name: Line 2
      description: Exact text for OSD line 2. Maximum 30 characters; longer text is truncated.
      required: false
      example: "==============="
      selector:
        text: {}

    duration:
      name: Duration
      description: Display duration 0 through 9. Use 9 to leave the message until cleared.
      required: false
      default: 5
      example: 5
      selector:
        number:
          min: 0
          max: 9
          mode: box

    center:
      name: Center
      description: Optional centering mode.
      required: false
      default: line1
      example: line1
      selector:
        select:
          mode: dropdown
          options:
            - label: Line 1
              value: line1
            - label: Line 2
              value: line2
            - label: Both lines
              value: both

    block_char:
      name: Block character
      description: Optional single legal ASCII character to display as a solid block in this OSD message.
      required: false
      example: "="
      selector:
        text: {}

clear_message:
  name: Clear message
  description: Clear any Lumagen OSD message.
  fields:
    entity_id:
      name: Entity
      description: Lumagen entity to control. Required when multiple Lumagen devices are configured.
      required: false
      selector:
        entity:
          integration: lumagen
